# pieces.yaml
# YOLOv8/YOLO11 training config for chess piece detection
# 12 classes (empty squares are not detected by YOLO; handled by absence)

path: data/annotated/pieces    # dataset root
train: images/train
val:   images/val
test:  images/test

nc: 12
names:
  - wK   # 0  White King
  - wQ   # 1  White Queen
  - wR   # 2  White Rook
  - wB   # 3  White Bishop
  - wN   # 4  White Knight
  - wP   # 5  White Pawn
  - bK   # 6  Black King
  - bQ   # 7  Black Queen
  - bR   # 8  Black Rook
  - bB   # 9  Black Bishop
  - bN   # 10 Black Knight
  - bP   # 11 Black Pawn
